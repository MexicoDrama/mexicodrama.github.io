<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MexiDrama | Ver Novelas en Vivo y HD</title>
    <style>
        :root { --gold: #d4af37; --bg: #020202; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; }
        .header { padding: 40px 5%; text-align: center; border-bottom: 2px solid var(--gold); }
        .hero { padding: 40px 5%; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px 5%; max-width: 1200px; margin: auto; }
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-content { padding: 15px; }
        .badge { background: var(--gold); color: #000; padding: 2px 8px; font-size: 12px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<header class="header">
    <h1 style="font-size: 3rem; margin: 0;">MEXI<span>DRAMA</span></h1>
    <p style="color: var(--gold);">Tu destino favorito de novelas en streaming</p>
</header>

<div class="hero">
    <h2>Últimos Estrenos</h2>
</div>

<div class="grid">
    <div class="card">
        <img src="https://mexicodrama.github.io/images/Coraz%C3%B3n-de-Oro.webp" alt="Corazón de Oro">
        <div class="card-content">
            <span class="badge">NUEVO</span>
            <h3>Corazón de Oro</h3>
            <p>Capítulo 77: El desenlace esperado</p>
            <a href="Corazon-de-Oro/capitulo-77.html" style="color: var(--gold); text-decoration: none; font-weight: bold;">Ver ahora →</a>
        </div>
    </div>
    
    </div>

<footer style="text-align: center; padding: 40px; color: #555;">
    © 2026 MexiDrama TV - Todos los derechos reservados
</footer>

</body>
</html>
